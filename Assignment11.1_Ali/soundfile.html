<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Sound Webpage</title>
  <!-- Link to the external CSS file -->
  <link rel="stylesheet" href="soundfile.css">
</head>
<body>
  <!-- Main container for the webpage content -->
  <div class="container">
    <!-- Page header -->
    <h1>League of Legends Sound Experience</h1>
    <p>Click the button below to hear some action-packed audio from League of Legends!</p>
    
    <!-- Button to trigger sound -->
    <button id="play-sound-btn">Play Sound</button>

    <!-- Add an image for visual appeal -->
    <img src="https://upload.wikimedia.org/wikipedia/en/7/77/League_of_Legends_logo.png" alt="League of Legends Logo" class="logo">
  </div>

  <!-- Embed the audio file for playback -->
  <audio id="game-audio" src="League of legends audio - copy right_All rights to Riot Game.m4a"></audio>

  <!-- Link to the external JavaScript file -->
  <script src="soundfile.js"></script>
</body>
</html>
